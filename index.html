<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedrock Manifest Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            900: '#312e81',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out'
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'Fira Code', monospace; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .json-key { color: #db2777; }
        .json-string { color: #059669; }
        .json-number { color: #d97706; }
        .json-boolean { color: #2563eb; }
        .json-null { color: #6b7280; }
        
        .dark .json-key { color: #f472b6; }
        .dark .json-string { color: #34d399; }
        .dark .json-number { color: #fbbf24; }
        .dark .json-boolean { color: #60a5fa; }
        .dark .json-null { color: #9ca3af; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }

        .tooltip .tooltip-text {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        .toast {
            transform: translateY(100%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen flex flex-col">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-brand-500 text-white p-2 rounded-lg shadow-lg shadow-brand-500/30">
                    <i class="fa-solid fa-cube text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Manifest<span class="text-brand-500 dark:text-brand-400">Gen</span></h1>
            </div>
            <div class="flex items-center gap-2 sm:gap-4">
                <div class="relative group">
                    <button id="btnPresets" class="px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> <span class="hidden sm:inline">Presets</span>
                    </button>
                    <div id="presetsDropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-100 dark:border-slate-700 overflow-hidden hidden transform origin-top-right transition-all scale-95 opacity-0 z-50">
                        <button class="preset-option w-full text-left px-4 py-3 text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" data-preset="resource">Resource Pack</button>
                        <button class="preset-option w-full text-left px-4 py-3 text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" data-preset="behavior">Behavior Pack</button>
                        <button class="preset-option w-full text-left px-4 py-3 text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors" data-preset="skin">Skin Pack</button>
                    </div>
                </div>
                <button id="btnReset" class="px-3 py-2 rounded-lg text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors tooltip relative flex items-center gap-2">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span class="tooltip-text absolute -bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs px-2 py-1 rounded whitespace-nowrap">Reset All</span>
                </button>
                <button id="btnTheme" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors w-10 h-10 flex items-center justify-center">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block text-amber-400"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7 flex flex-col gap-6" data-aos="fade-right">
            
            <div class="flex space-x-1 bg-slate-200/50 dark:bg-slate-800/50 p-1 rounded-xl">
                <button class="tab-btn active w-full py-2.5 text-sm font-medium rounded-lg transition-all bg-white dark:bg-slate-900 shadow text-brand-600 dark:text-brand-400" data-target="tab-header">Header</button>
                <button class="tab-btn w-full py-2.5 text-sm font-medium rounded-lg transition-all hover:bg-white/50 dark:hover:bg-slate-800/50 text-slate-600 dark:text-slate-400" data-target="tab-modules">Modules</button>
                <button class="tab-btn w-full py-2.5 text-sm font-medium rounded-lg transition-all hover:bg-white/50 dark:hover:bg-slate-800/50 text-slate-600 dark:text-slate-400" data-target="tab-dependencies">Dependencies</button>
            </div>

            <div id="tab-header" class="tab-content block bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 p-6 animate-fade-in">
                <div class="space-y-5">
                    <div>
                        <label class="flex items-center gap-2 text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">
                            Name
                            <div class="tooltip relative text-slate-400 cursor-help">
                                <i class="fa-solid fa-circle-info"></i>
                                <span class="tooltip-text absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-slate-800 text-white text-xs px-2 py-1 rounded w-48 text-center z-10">The display name of the pack.</span>
                            </div>
                        </label>
                        <input type="text" id="h-name" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all" placeholder="My Awesome Pack">
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">
                            Description
                        </label>
                        <textarea id="h-desc" rows="3" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all resize-none" placeholder="A brief description of what this pack does."></textarea>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">
                            UUID
                            <div class="tooltip relative text-slate-400 cursor-help">
                                <i class="fa-solid fa-circle-info"></i>
                                <span class="tooltip-text absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-slate-800 text-white text-xs px-2 py-1 rounded w-48 text-center z-10">Unique identifier for the pack. Must be different for every pack.</span>
                            </div>
                        </label>
                        <div class="flex gap-2">
                            <input type="text" id="h-uuid" class="flex-1 bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm font-mono focus:ring-2 focus:ring-brand-500 outline-none transition-all" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
                            <button onclick="genUUID('h-uuid')" class="bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 px-4 rounded-xl transition-colors tooltip relative">
                                <i class="fa-solid fa-rotate"></i>
                                <span class="tooltip-text absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs px-2 py-1 rounded whitespace-nowrap">Generate New</span>
                            </button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Version</label>
                            <div class="flex items-center gap-2">
                                <input type="number" id="h-v1" value="1" min="0" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl px-3 py-2 text-center focus:ring-2 focus:ring-brand-500 outline-none transition-all">
                                <span class="text-slate-400 font-bold">.</span>
                                <input type="number" id="h-v2" value="0" min="0" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl px-3 py-2 text-center focus:ring-2 focus:ring-brand-500 outline-none transition-all">
                                <span class="text-slate-400 font-bold">.</span>
                                <input type="number" id="h-v3" value="0" min="0" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl px-3 py-2 text-center focus:ring-2 focus:ring-brand-500 outline-none transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Min Engine Version</label>
                            <div class="flex items-center gap-2">
                                <input type="number" id="e-v1" value="1" min="0" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl px-3 py-2 text-center focus:ring-2 focus:ring-brand-500 outline-none transition-all">
                                <span class="text-slate-400 font-bold">.</span>
                                <input type="number" id="e-v2" value="16" min="0" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl px-3 py-2 text-center focus:ring-2 focus:ring-brand-500 outline-none transition-all">
                                <span class="text-slate-400 font-bold">.</span>
                                <input type="number" id="e-v3" value="0" min="0" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl px-3 py-2 text-center focus:ring-2 focus:ring-brand-500 outline-none transition-all">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-modules" class="tab-content hidden animate-fade-in">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-slate-800 dark:text-white">Modules</h2>
                    <button onclick="addModule()" class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all transform hover:scale-105 active:scale-95 shadow-md flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Add Module
                    </button>
                </div>
                <div id="modules-container" class="space-y-4"></div>
                <div id="modules-empty" class="text-center py-10 bg-white dark:bg-slate-900 border border-dashed border-slate-300 dark:border-slate-700 rounded-2xl hidden">
                    <i class="fa-solid fa-boxes-stacked text-4xl text-slate-300 dark:text-slate-600 mb-3"></i>
                    <p class="text-slate-500 dark:text-slate-400 text-sm">No modules added yet.</p>
                </div>
            </div>

            <div id="tab-dependencies" class="tab-content hidden animate-fade-in">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-slate-800 dark:text-white">Dependencies</h2>
                    <button onclick="addDependency()" class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-xl text-sm font-medium transition-all transform hover:scale-105 active:scale-95 shadow-md flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Add Dependency
                    </button>
                </div>
                <div id="dependencies-container" class="space-y-4"></div>
                <div id="dependencies-empty" class="text-center py-10 bg-white dark:bg-slate-900 border border-dashed border-slate-300 dark:border-slate-700 rounded-2xl hidden">
                    <i class="fa-solid fa-link text-4xl text-slate-300 dark:text-slate-600 mb-3"></i>
                    <p class="text-slate-500 dark:text-slate-400 text-sm">No dependencies added yet.</p>
                </div>
            </div>

        </div>

        <div class="lg:col-span-5 relative" data-aos="fade-left">
            <div class="sticky top-24 bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col h-[calc(100vh-8rem)]">
                <div class="bg-slate-100 dark:bg-slate-800 px-4 py-3 flex justify-between items-center border-b border-slate-200 dark:border-slate-700">
                    <div class="flex items-center gap-2 text-sm font-mono text-slate-600 dark:text-slate-300">
                        <i class="fa-solid fa-file-code text-brand-500"></i> manifest.json
                    </div>
                    <div class="flex gap-2">
                        <button onclick="copyJson()" class="p-1.5 rounded bg-white dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:text-brand-600 dark:hover:text-brand-400 shadow-sm transition-colors tooltip relative">
                            <i class="fa-regular fa-copy"></i>
                            <span class="tooltip-text absolute -bottom-8 right-0 bg-slate-800 text-white text-xs px-2 py-1 rounded whitespace-nowrap">Copy</span>
                        </button>
                        <button onclick="downloadJson()" class="p-1.5 rounded bg-brand-500 hover:bg-brand-600 text-white shadow-sm transition-colors tooltip relative">
                            <i class="fa-solid fa-download"></i>
                            <span class="tooltip-text absolute -bottom-8 right-0 bg-slate-800 text-white text-xs px-2 py-1 rounded whitespace-nowrap">Download</span>
                        </button>
                    </div>
                </div>
                <div class="flex-1 overflow-auto p-4 bg-slate-50 dark:bg-slate-950">
                    <pre><code id="json-preview" class="text-sm font-mono whitespace-pre block"></code></pre>
                </div>
            </div>
        </div>

    </main>

    <div id="toast" class="toast fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 z-50">
        <i id="toast-icon" class="fa-solid fa-check-circle text-green-400"></i>
        <span id="toast-msg" class="text-sm font-medium">Action successful</span>
    </div>

    <template id="tpl-module">
        <div class="module-item bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-5 shadow-sm relative group animate-slide-up">
            <button onclick="removeModule(this)" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition-colors bg-slate-50 dark:bg-slate-800 hover:bg-red-50 dark:hover:bg-red-900/20 p-2 rounded-lg">
                <i class="fa-solid fa-trash-can"></i>
            </button>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4 pr-10">
                <div>
                    <label class="block text-xs font-semibold mb-1 text-slate-500 dark:text-slate-400 uppercase tracking-wider">Type</label>
                    <div class="relative">
                        <select class="mod-type w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg px-3 py-2 text-sm appearance-none focus:ring-2 focus:ring-brand-500 outline-none">
                            <option value="resources">resources</option>
                            <option value="data">data</option>
                            <option value="client_data">client_data</option>
                            <option value="interface">interface</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-400 pointer-events-none"></i>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold mb-1 text-slate-500 dark:text-slate-400 uppercase tracking-wider">Version</label>
                    <div class="flex items-center gap-1">
                        <input type="number" class="mod-v1 w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg px-2 py-2 text-center text-sm focus:ring-2 focus:ring-brand-500 outline-none" value="1" min="0">
                        <span class="text-slate-400 font-bold">.</span>
                        <input type="number" class="mod-v2 w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg px-2 py-2 text-center text-sm focus:ring-2 focus:ring-brand-500 outline-none" value="0" min="0">
                        <span class="text-slate-400 font-bold">.</span>
                        <input type="number" class="mod-v3 w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg px-2 py-2 text-center text-sm focus:ring-2 focus:ring-brand-500 outline-none" value="0" min="0">
                    </div>
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold mb-1 text-slate-500 dark:text-slate-400 uppercase tracking-wider">UUID</label>
                <div class="flex gap-2">
                    <input type="text" class="mod-uuid flex-1 bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg px-3 py-2 text-sm font-mono focus:ring-2 focus:ring-brand-500 outline-none" readonly>
                    <button onclick="regenModuleUUID(this)" class="bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 px-3 rounded-lg transition-colors">
                        <i class="fa-solid fa-rotate text-sm"></i>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-dependency">
        <div class="dep-item bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-5 shadow-sm relative group animate-slide-up">
            <button onclick="removeDependency(this)" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition-colors bg-slate-50 dark:bg-slate-800 hover:bg-red-50 dark:hover:bg-red-900/20 p-2 rounded-lg">
                <i class="fa-solid fa-trash-can"></i>
            </button>
            <div class="mb-4 pr-10">
                <label class="block text-xs font-semibold mb-1 text-slate-500 dark:text-slate-400 uppercase tracking-wider">Target UUID</label>
                <input type="text" class="dep-uuid w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg px-3 py-2 text-sm font-mono focus:ring-2 focus:ring-brand-500 outline-none" placeholder="Target pack UUID">
            </div>
            <div>
                <label class="block text-xs font-semibold mb-1 text-slate-500 dark:text-slate-400 uppercase tracking-wider">Version</label>
                <div class="flex items-center gap-1 w-full sm:w-1/2">
                    <input type="number" class="dep-v1 w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg px-2 py-2 text-center text-sm focus:ring-2 focus:ring-brand-500 outline-none" value="1" min="0">
                    <span class="text-slate-400 font-bold">.</span>
                    <input type="number" class="dep-v2 w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg px-2 py-2 text-center text-sm focus:ring-2 focus:ring-brand-500 outline-none" value="0" min="0">
                    <span class="text-slate-400 font-bold">.</span>
                    <input type="number" class="dep-v3 w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg px-2 py-2 text-center text-sm focus:ring-2 focus:ring-brand-500 outline-none" value="0" min="0">
                </div>
            </div>
        </div>
    </template>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, offset: 50 });

        const state = {
            format_version: 2,
            header: {
                name: "",
                description: "",
                uuid: "",
                version: [1, 0, 0],
                min_engine_version: [1, 16, 0]
            },
            modules: [],
            dependencies: []
        };

        const DOM = {
            hName: document.getElementById('h-name'),
            hDesc: document.getElementById('h-desc'),
            hUuid: document.getElementById('h-uuid'),
            hV1: document.getElementById('h-v1'),
            hV2: document.getElementById('h-v2'),
            hV3: document.getElementById('h-v3'),
            eV1: document.getElementById('e-v1'),
            eV2: document.getElementById('e-v2'),
            eV3: document.getElementById('e-v3'),
            modContainer: document.getElementById('modules-container'),
            depContainer: document.getElementById('dependencies-container'),
            modEmpty: document.getElementById('modules-empty'),
            depEmpty: document.getElementById('dependencies-empty'),
            preview: document.getElementById('json-preview'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toast-msg'),
            toastIcon: document.getElementById('toast-icon')
        };

        function init() {
            setupTheme();
            setupTabs();
            setupDropdown();
            bindHeaderEvents();
            
            const saved = localStorage.getItem('manifestState');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    Object.assign(state, parsed);
                    populateUI();
                } catch(e) {
                    resetState();
                }
            } else {
                state.header.uuid = crypto.randomUUID();
                populateUI();
            }

            document.getElementById('btnReset').addEventListener('click', () => {
                if(confirm('Are you sure you want to reset all fields?')) {
                    resetState();
                }
            });

            updatePreview();
        }

        function setupTheme() {
            const btn = document.getElementById('btnTheme');
            const html = document.documentElement;
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }
            btn.addEventListener('click', () => {
                html.classList.toggle('dark');
                localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
            });
        }

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('active', 'bg-white', 'dark:bg-slate-900', 'shadow', 'text-brand-600', 'dark:text-brand-400');
                        b.classList.add('hover:bg-white/50', 'dark:hover:bg-slate-800/50', 'text-slate-600', 'dark:text-slate-400');
                    });
                    const target = e.target;
                    target.classList.remove('hover:bg-white/50', 'dark:hover:bg-slate-800/50', 'text-slate-600', 'dark:text-slate-400');
                    target.classList.add('active', 'bg-white', 'dark:bg-slate-900', 'shadow', 'text-brand-600', 'dark:text-brand-400');
                    
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                    document.getElementById(target.dataset.target).classList.remove('hidden');
                });
            });
        }

        function setupDropdown() {
            const btn = document.getElementById('btnPresets');
            const menu = document.getElementById('presetsDropdown');
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isHidden = menu.classList.contains('hidden');
                if (isHidden) {
                    menu.classList.remove('hidden');
                    setTimeout(() => {
                        menu.classList.remove('scale-95', 'opacity-0');
                        menu.classList.add('scale-100', 'opacity-100');
                    }, 10);
                } else {
                    closeDropdown();
                }
            });

            document.addEventListener('click', closeDropdown);

            document.querySelectorAll('.preset-option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    applyPreset(e.target.dataset.preset);
                    closeDropdown();
                });
            });

            function closeDropdown() {
                menu.classList.remove('scale-100', 'opacity-100');
                menu.classList.add('scale-95', 'opacity-0');
                setTimeout(() => menu.classList.add('hidden'), 150);
            }
        }

        function bindHeaderEvents() {
            const updateH = () => {
                state.header.name = DOM.hName.value;
                state.header.description = DOM.hDesc.value;
                state.header.uuid = DOM.hUuid.value;
                state.header.version = [parseInt(DOM.hV1.value)||0, parseInt(DOM.hV2.value)||0, parseInt(DOM.hV3.value)||0];
                state.header.min_engine_version = [parseInt(DOM.eV1.value)||0, parseInt(DOM.eV2.value)||0, parseInt(DOM.eV3.value)||0];
                updatePreview();
            };
            [DOM.hName, DOM.hDesc, DOM.hUuid, DOM.hV1, DOM.hV2, DOM.hV3, DOM.eV1, DOM.eV2, DOM.eV3].forEach(el => {
                el.addEventListener('input', updateH);
            });
        }

        function populateUI() {
            DOM.hName.value = state.header.name || "";
            DOM.hDesc.value = state.header.description || "";
            DOM.hUuid.value = state.header.uuid || "";
            DOM.hV1.value = state.header.version[0];
            DOM.hV2.value = state.header.version[1];
            DOM.hV3.value = state.header.version[2];
            DOM.eV1.value = state.header.min_engine_version[0];
            DOM.eV2.value = state.header.min_engine_version[1];
            DOM.eV3.value = state.header.min_engine_version[2];

            DOM.modContainer.innerHTML = '';
            state.modules.forEach(m => renderModule(m));
            updateEmptyStates();

            DOM.depContainer.innerHTML = '';
            state.dependencies.forEach(d => renderDependency(d));
            updateEmptyStates();
        }

        function genUUID(targetId) {
            const el = document.getElementById(targetId);
            el.value = crypto.randomUUID();
            el.dispatchEvent(new Event('input'));
        }

        function addModule() {
            const mod = {
                type: 'resources',
                uuid: crypto.randomUUID(),
                version: [1, 0, 0]
            };
            state.modules.push(mod);
            renderModule(mod);
            updatePreview();
            updateEmptyStates();
        }

        function renderModule(mod) {
            const tpl = document.getElementById('tpl-module').content.cloneNode(true);
            const el = tpl.querySelector('.module-item');
            el.dataset.uuid = mod.uuid;
            
            const typeSel = el.querySelector('.mod-type');
            const uuidIn = el.querySelector('.mod-uuid');
            const v1 = el.querySelector('.mod-v1');
            const v2 = el.querySelector('.mod-v2');
            const v3 = el.querySelector('.mod-v3');

            typeSel.value = mod.type;
            uuidIn.value = mod.uuid;
            v1.value = mod.version[0];
            v2.value = mod.version[1];
            v3.value = mod.version[2];

            const updateM = () => {
                const idx = state.modules.findIndex(m => m.uuid === el.dataset.uuid);
                if (idx > -1) {
                    state.modules[idx].type = typeSel.value;
                    state.modules[idx].uuid = uuidIn.value;
                    state.modules[idx].version = [parseInt(v1.value)||0, parseInt(v2.value)||0, parseInt(v3.value)||0];
                    updatePreview();
                }
            };

            [typeSel, uuidIn, v1, v2, v3].forEach(i => i.addEventListener('input', updateM));
            DOM.modContainer.appendChild(el);
        }

        function removeModule(btn) {
            const el = btn.closest('.module-item');
            state.modules = state.modules.filter(m => m.uuid !== el.dataset.uuid);
            el.remove();
            updatePreview();
            updateEmptyStates();
        }

        function regenModuleUUID(btn) {
            const el = btn.closest('.module-item');
            const input = el.querySelector('.mod-uuid');
            input.value = crypto.randomUUID();
            input.dispatchEvent(new Event('input'));
            const idx = state.modules.findIndex(m => m.uuid === el.dataset.uuid);
            if(idx > -1) {
                state.modules[idx].uuid = input.value;
                el.dataset.uuid = input.value;
            }
        }

        function addDependency() {
            const dep = {
                uuid: "",
                version: [1, 0, 0],
                _internalId: crypto.randomUUID()
            };
            state.dependencies.push(dep);
            renderDependency(dep);
            updatePreview();
            updateEmptyStates();
        }

        function renderDependency(dep) {
            const tpl = document.getElementById('tpl-dependency').content.cloneNode(true);
            const el = tpl.querySelector('.dep-item');
            el.dataset.id = dep._internalId || crypto.randomUUID();
            dep._internalId = el.dataset.id;
            
            const uuidIn = el.querySelector('.dep-uuid');
            const v1 = el.querySelector('.dep-v1');
            const v2 = el.querySelector('.dep-v2');
            const v3 = el.querySelector('.dep-v3');

            uuidIn.value = dep.uuid;
            v1.value = dep.version[0];
            v2.value = dep.version[1];
            v3.value = dep.version[2];

            const updateD = () => {
                const idx = state.dependencies.findIndex(d => d._internalId === el.dataset.id);
                if (idx > -1) {
                    state.dependencies[idx].uuid = uuidIn.value;
                    state.dependencies[idx].version = [parseInt(v1.value)||0, parseInt(v2.value)||0, parseInt(v3.value)||0];
                    updatePreview();
                }
            };

            [uuidIn, v1, v2, v3].forEach(i => i.addEventListener('input', updateD));
            DOM.depContainer.appendChild(el);
        }

        function removeDependency(btn) {
            const el = btn.closest('.dep-item');
            state.dependencies = state.dependencies.filter(d => d._internalId !== el.dataset.id);
            el.remove();
            updatePreview();
            updateEmptyStates();
        }

        function updateEmptyStates() {
            DOM.modEmpty.style.display = state.modules.length === 0 ? 'block' : 'none';
            DOM.depEmpty.style.display = state.dependencies.length === 0 ? 'block' : 'none';
        }

        function generateFinalJSON() {
            const out = {
                format_version: state.format_version,
                header: {
                    name: state.header.name,
                    description: state.header.description,
                    uuid: state.header.uuid,
                    version: state.header.version,
                    min_engine_version: state.header.min_engine_version
                }
            };

            if (state.modules.length > 0) {
                out.modules = state.modules.map(m => ({
                    type: m.type,
                    uuid: m.uuid,
                    version: m.version
                }));
            }

            if (state.dependencies.length > 0) {
                out.dependencies = state.dependencies.map(d => ({
                    uuid: d.uuid,
                    version: d.version
                }));
            }

            return out;
        }

        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) cls = 'json-key';
                    else cls = 'json-string';
                } else if (/true|false/.test(match)) cls = 'json-boolean';
                else if (/null/.test(match)) cls = 'json-null';
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        function updatePreview() {
            const obj = generateFinalJSON();
            const str = JSON.stringify(obj, null, 4);
            DOM.preview.innerHTML = syntaxHighlight(str);
            localStorage.setItem('manifestState', JSON.stringify(state));
        }

        function resetState() {
            state.header = { name: "", description: "", uuid: crypto.randomUUID(), version: [1, 0, 0], min_engine_version: [1, 16, 0] };
            state.modules = [];
            state.dependencies = [];
            populateUI();
            updatePreview();
            showToast('Reset successfully', 'success');
        }

        function applyPreset(type) {
            resetState();
            state.header.name = `My ${type.charAt(0).toUpperCase() + type.slice(1)} Pack`;
            state.header.description = `A custom ${type} pack.`;
            
            if (type === 'resource') {
                state.modules.push({ type: 'resources', uuid: crypto.randomUUID(), version: [1, 0, 0] });
            } else if (type === 'behavior') {
                state.modules.push({ type: 'data', uuid: crypto.randomUUID(), version: [1, 0, 0] });
            } else if (type === 'skin') {
                state.modules.push({ type: 'client_data', uuid: crypto.randomUUID(), version: [1, 0, 0] });
            }
            
            populateUI();
            updatePreview();
            showToast(`${type.charAt(0).toUpperCase() + type.slice(1)} preset loaded`, 'success');
        }

        function copyJson() {
            const str = JSON.stringify(generateFinalJSON(), null, 4);
            navigator.clipboard.writeText(str).then(() => {
                showToast('Copied to clipboard!', 'success');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = str;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast('Copied to clipboard!', 'success');
                } catch (err) {
                    showToast('Failed to copy', 'error');
                }
                document.body.removeChild(textarea);
            });
        }

        function downloadJson() {
            const str = JSON.stringify(generateFinalJSON(), null, 4);
            const blob = new Blob([str], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'manifest.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('Downloaded manifest.json', 'success');
        }

        let toastTimeout;
        function showToast(msg, type) {
            clearTimeout(toastTimeout);
            DOM.toastMsg.textContent = msg;
            DOM.toastIcon.className = type === 'success' ? 'fa-solid fa-check-circle text-green-400' : 'fa-solid fa-circle-exclamation text-red-400';
            DOM.toast.classList.add('show');
            toastTimeout = setTimeout(() => {
                DOM.toast.classList.remove('show');
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
